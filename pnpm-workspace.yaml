packages:
  - 'benchmarks'
  - 'website'
  - 'scripts/**'
  - 'packages/**'
  - 'examples/**'
  - 'e2e/**'

allowBuilds:
  '@parcel/watcher': false
  '@swc/core': false
  '@vscode/vsce-sign': false
  core-js-pure: false
  keytar: false
  lefthook: true
  svelte-preprocess: false

autoInstallPeers: false

# TEMP (do not commit): validate rspack canary with build-resolved mock info (PR web-infra-dev/rspack#14665)
overrides:
  '@rspack/core': 'npm:@rspack-canary/core@2.1.3-canary-7caa6eff-20260703032940'

# for vsce
hoistPattern: ['@secretlint/*']

# Reduce the risk of installing compromised packages
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@rspack/*'
  - '@rspack-canary/*'
  - '@rsbuild/*'
  - '@rslib/*'
  - '@rspress/*'
  - '@rstest/*'
  - '@rsdoctor/*'
  - '@rslint/*'
  - '@rstack-dev/doc-ui'
  # Renovate update: @rslib/core@0.23.0 depends on rsbuild-plugin-dts@0.23.0
  - rsbuild-plugin-dts@0.23.0
  # Renovate security update: svelte@5.55.7
  - svelte@5.55.7

packageExtensions:
  '@vue/test-utils':
    peerDependencies:
      '@vue/compiler-dom': 3.5.17
      '@vue/server-renderer': 3.5.17
      vue: ^3.5.17

# Prevent un-reviewed build scripts
strictDepBuilds: true

strictPeerDependencies: false
