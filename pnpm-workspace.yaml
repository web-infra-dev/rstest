packages:
  - 'benchmarks'
  - 'website'
  - 'scripts/**'
  - 'packages/**'
  - 'examples/**'
  - 'e2e/**'

allowBuilds:
  '@parcel/watcher': false
  '@swc/core': false
  '@vscode/vsce-sign': false
  core-js-pure: false
  keytar: false
  lefthook: true
  svelte-preprocess: false

autoInstallPeers: false

# TEMPORARY: route @rspack/core to a canary that emits the dynamic-import-of-
# external mock codegen (rspack#14247), so the runtime fix in this PR can be
# verified end-to-end. The canary's `@rspack/binding` alias is pulled in
# automatically. Revert to the stable @rspack/core once rspack#14247 ships.
overrides:
  '@rspack/core': npm:@rspack-canary/core@2.0.7-canary-dda7b8cb-20260608101727

# for vsce
hoistPattern: ['@secretlint/*']

# Reduce the risk of installing compromised packages
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@rspack/*'
  # TEMPORARY: paired with the `@rspack/core` canary override below; drop when the
  # override is reverted to the stable @rspack/core.
  - '@rspack-canary/*'
  - '@rsbuild/*'
  - '@rslib/*'
  - '@rspress/*'
  - '@rstest/*'
  - '@rsdoctor/*'
  - '@rslint/*'
  - '@rstack-dev/doc-ui'
  # Renovate security update: svelte@5.55.7
  - svelte@5.55.7

packageExtensions:
  '@vue/test-utils':
    peerDependencies:
      '@vue/compiler-dom': 3.5.17
      '@vue/server-renderer': 3.5.17
      vue: ^3.5.17

# Prevent un-reviewed build scripts
strictDepBuilds: true

strictPeerDependencies: false
