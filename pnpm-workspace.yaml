packages:
  - 'benchmarks'
  - 'website'
  - 'scripts/**'
  - 'packages/**'
  - 'examples/**'
  - 'e2e/**'

allowBuilds:
  '@parcel/watcher': false
  '@swc/core': false
  '@vscode/vsce-sign': false
  core-js-pure: false
  keytar: false
  lefthook: true
  svelte-preprocess: false

autoInstallPeers: false

# The federation examples consume `@module-federation/rstest` canaries from
# pkg.pr.new (not yet published to npm), which pnpm treats as exotic.
blockExoticSubdeps: false

# for vsce
hoistPattern: [ '@secretlint/*' ]

# Reduce the risk of installing compromised packages
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@module-federation/*'
  - '@rspack/*'
  - '@rsbuild/*'
  - '@rslib/*'
  - '@rspress/*'
  - '@rstest/*'
  - '@rsdoctor/*'
  - '@rslint/*'
  - '@rstack-dev/doc-ui'
  - rsbuild-plugin-dts
  # Renovate security update: svelte@5.55.7
  - svelte@5.55.7
  # Renovate security update: react-router@7.18.0
  - react-router@7.18.0

packageExtensions:
  '@vue/test-utils':
    peerDependencies:
      '@vue/compiler-dom': 3.5.17
      '@vue/server-renderer': 3.5.17
      vue: ^3.5.17

# Prevent un-reviewed build scripts
strictDepBuilds: true

strictPeerDependencies: false
