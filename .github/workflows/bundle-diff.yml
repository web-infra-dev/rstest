name: Bundle Diff

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - '**/*.md'
      - '**/*.mdx'

  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '**/*.mdx'

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

permissions:
  contents: write
  actions: read
  issues: write
  pull-requests: write

env:
  NODE_OPTIONS: --max-old-space-size=6144

jobs:
  bundle-diff:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build with Rsdoctor
        run: RSDOCTOR_CI=true pnpm --filter "./packages/*" run build
        env:
          CI: true

      - name: Bundle Analysis
        uses: web-infra-dev/rsdoctor-action@af81e75f01c6d546e638a3ba1aa0ff8e8ee64ac0
        with:
          file_path: 'packages/*/.rsdoctor/**/rsdoctor-data.json'
          target_branch: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || 'main' }}
