name: Test

on:
  pull_request:
    branches: [main]

  push:
    branches: [main]

  workflow_dispatch:
    inputs:
      fullRun:
        description: 'Run the full e2e matrix'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

permissions:
  contents: read

env:
  # Configure Node.js memory limit to 6GB (default GitHub Actions limit is 7GB)
  NODE_OPTIONS: --max-old-space-size=6144

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.changes.outputs.changed }}
      # Full e2e sweep: push to main (post-merge gate) or release PR (pre-publish gate)
      is_full_run: ${{ github.event_name == 'push' || startsWith(github.event.pull_request.title, 'release:') || inputs.fullRun }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1

      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: changes
        with:
          predicate-quantifier: 'every'
          filters: |
            changed:
              - "!**/*.md"
              - "!**/*.mdx"
              - "!**/_meta.json"
              - "!**/dictionary.txt"

  # ======== lint ========
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          package-manager-cache: false

      - name: Install Dependencies
        run: pnpm install --ignore-scripts

      - name: Build Packages
        run: pnpm run build
        env:
          # Publish checks are comparatively expensive and only need to run once
          # as part of the lint/static-check gate.
          RSTEST_PUBLISH_CHECK: true

      - name: Lint
        run: pnpm run lint

      - name: Check Dependency Version
        run: pnpm run check-dependency-version

      - name: Check Version Consistency
        run: pnpm run check-version-consistency

      - name: Check Unused Code
        run: pnpm run check-unused

      - name: Check pnpm Dedupe
        # Keep dedupe last: `pnpm dedupe --check` may leave pnpm's modules
        # state needing a reconcile. If another `pnpm run ...` follows it,
        # pnpm can enter its implicit install path and rerun lifecycle scripts
        # such as the root `prepare`.
        run: pnpm dedupe --check --config.minimum-release-age=0

  # ======== ut ========
  ut:
    # Gate behind lint so a lint failure skips ut — and transitively e2e —
    # before they start; e2e already needs lint. Trade-off: any lint nit
    # (prettier/spell/dedupe/knip) now blocks ut+e2e too, instead of running
    # them in parallel with lint.
    #
    # ut is OS-agnostic by convention: it runs only on ubuntu (the cheapest,
    # most plentiful runner in the org pool), and OS-specific behavior is
    # covered by the e2e job's macOS/Windows rows instead.
    needs: [prepare, lint]
    if: needs.prepare.outputs.changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          package-manager-cache: false

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build Packages
        run: pnpm run build

      - name: Run Test
        run: pnpm run test

      - name: Run Examples Test
        run: pnpm run test:examples

      - name: Run Federation Example Test
        run: pnpm run test:federation

  # ======== e2e ========
  e2e:
    needs: [prepare, lint, ut]
    if: needs.prepare.outputs.changed == 'true'
    runs-on: ${{ matrix.os }}
    # Full runs execute all four e2e scripts sequentially in one job; the
    # slowest measured combo (windows/20) takes ~31 min.
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        # Sparse matrix (include-only), not an os × node cross-product:
        #   - macOS/Windows run the primary Node (24) to catch OS-specific
        #     breakage — ut runs on ubuntu only, so this is where OS coverage
        #     lives.
        #   - The extra Node versions (20, 26) run on ubuntu: Node-version
        #     compat is OS-independent, and ubuntu runners are the cheapest
        #     and most plentiful in the org pool.
        #
        #   trigger      | combos                  | scripts run as steps
        #   -------------+-------------------------+------------------------------
        #   PR (regular) | macos/24, windows/24    | test
        #   push to main | + ubuntu/20, ubuntu/26  | test, commonjs, no-isolate, threads
        #   release PR   | + ubuntu/20, ubuntu/26  | test, commonjs, no-isolate, threads
        #
        # The e2e scripts (test, test:commonjs, test:no-isolate, test:threads)
        # are sequential steps of one job, not a matrix axis: they share the
        # same ~2 min checkout/install/build setup, and collapsing them keeps
        # the job count down so a burst of merges does not starve the org-wide
        # runner pool.
        #
        # Node 20 + test:no-isolate can hit upstream vm native crashes under worker
        # reuse; tolerated on full runs in exchange for coverage.
        # Node 26 covers the current line, where Web Storage is enabled by default
        # and `localStorage` exists on globalThis before a DOM environment is set up.
        include: >-
          ${{ fromJson(
            needs.prepare.outputs.is_full_run == 'true'
              && '[{"os":"macos-latest","node_version":"24"},{"os":"windows-latest","node_version":"24"},{"os":"ubuntu-latest","node_version":"20"},{"os":"ubuntu-latest","node_version":"26"}]'
            || '[{"os":"macos-latest","node_version":"24"},{"os":"windows-latest","node_version":"24"}]'
          ) }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1

      - name: Setup pnpm standalone
        if: matrix.node_version == '20'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          # pnpm 11 requires Node >=22, but this matrix intentionally tests Node 20 runtime behavior.
          standalone: true

      - name: Setup pnpm
        if: matrix.node_version != '20'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js ${{ matrix.node_version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node_version }}
          package-manager-cache: false

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build Packages
        id: build
        run: pnpm run build

      - name: Setup Playwright
        # Every job runs the `test` script, which includes browser-mode e2e
        # (incl. the WebKit fixture), so browsers are always needed.
        uses: ./.github/actions/setup-playwright
        with:
          install-webkit: 'true'

      - name: E2E Test (test)
        id: e2e_test
        run: cd e2e && pnpm test

      # Each remaining script is gated on the build having succeeded but NOT on
      # the previous scripts, so one failing script does not mask the others'
      # results — they were independent matrix jobs before being collapsed into
      # steps.
      - name: E2E Test (test:commonjs)
        if: ${{ needs.prepare.outputs.is_full_run == 'true' && !cancelled() && steps.build.outcome == 'success' }}
        run: cd e2e && pnpm test:commonjs

      - name: E2E Test (test:no-isolate)
        if: ${{ needs.prepare.outputs.is_full_run == 'true' && !cancelled() && steps.build.outcome == 'success' }}
        run: cd e2e && pnpm test:no-isolate

      - name: E2E Test (test:threads)
        if: ${{ needs.prepare.outputs.is_full_run == 'true' && !cancelled() && steps.build.outcome == 'success' }}
        run: cd e2e && pnpm test:threads

      - name: VS Code Extension Test
        # OS-sensitive (Extension Host) but node-insensitive: run once per OS
        # on full runs (the node 24 combos) and on the single PR combo
        # (Windows + node 24). Gated on the `test` script succeeding, matching
        # the pre-collapse behavior where it ran after the `test` row's e2e
        # step.
        if: ${{ !cancelled() && steps.e2e_test.outcome == 'success' && matrix.node_version == '24' && (needs.prepare.outputs.is_full_run == 'true' || matrix.os == 'windows-latest') }}
        run: pnpm run test:vscode

  # ======== codspeed ========
  # Temporarily disabled: CodSpeed runner quota exhausted.
  # Re-enable once quota resets.
  codspeed:
    needs: e2e
    if: false
    permissions:
      actions: read
      contents: read
      id-token: write
    uses: ./.github/workflows/codspeed.yml
    with:
      ref: ${{ github.sha }}

  # ======== gate ========
  test-gate:
    needs: [prepare, lint, ut, e2e]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check test requirement
        run: |
          for result in \
            "${{ needs.prepare.result }}" \
            "${{ needs.lint.result }}" \
            "${{ needs.ut.result }}" \
            "${{ needs.e2e.result }}"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              exit 1
            fi
          done
