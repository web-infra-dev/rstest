name: Test

on:
  pull_request:
    branches: [main]

  push:
    branches: [main]

  schedule:
    - cron: '0 16 * * *'

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

permissions:
  contents: read

env:
  # Configure Node.js memory limit to 6GB (default GitHub Actions limit is 7GB)
  NODE_OPTIONS: --max-old-space-size=6144

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.changes.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: changes
        with:
          predicate-quantifier: 'every'
          filters: |
            changed:
              - "!**/*.md"
              - "!**/*.mdx"
              - "!**/_meta.json"
              - "!**/dictionary.txt"

  # ======== lint ========
  lint:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Install pnpm
        run: |
          npm install -g corepack@latest --force
          corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --ignore-scripts

      - name: Build Packages
        run: pnpm run build

      - name: Lint
        run: pnpm run lint

      - name: Check Dependency Version
        run: pnpm run check-dependency-version

      - name: Check pnpm Dedupe
        run: pnpm dedupe --check

      - name: Check Unused Code
        run: pnpm run check-unused

  # ======== ut ========
  ut:
    needs: prepare
    if: needs.prepare.outputs.changed == 'true' || github.event_name == 'schedule'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      matrix:
        # run ut in macOS, as SWC cases will fail in Ubuntu CI
        os: [macos-14, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: pnpm fetch
        run: pnpm fetch

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Set Playwright cache path
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            echo "PLAYWRIGHT_BROWSERS_PATH=$USERPROFILE/AppData/Local/ms-playwright" >> "$GITHUB_ENV"
          else
            echo "PLAYWRIGHT_BROWSERS_PATH=$HOME/Library/Caches/ms-playwright" >> "$GITHUB_ENV"
          fi

      - name: Cache Playwright Browsers
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Browsers
        run: npx playwright install chromium webkit

      - name: Run Type Check
        run: pnpm run typecheck

      - name: Run Test
        run: pnpm run test

      - name: Run Examples Test
        run: pnpm run test:examples

  # ======== e2e ========
  e2e:
    needs: [prepare, lint, ut]
    if: |
      always() &&
      (needs.prepare.outputs.changed == 'true' || github.event_name == 'schedule') &&
      needs.ut.result == 'success' &&
      (github.event_name == 'schedule' || needs.lint.result == 'success')
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # run ut in macOS, as SWC cases will fail in Ubuntu CI
        os: [macos-14, windows-latest]
        node_version: ${{ fromJson(github.event_name == 'schedule' && '["20","22","24"]' || '["20","24"]') }}
        test_script: ['test', 'test:commonjs', 'test:no-isolate']
        exclude:
          # Node 20 is flaky here because reused no-isolate workers can hit upstream vm native crashes.
          - node_version: '20'
            test_script: 'test:no-isolate'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Setup Node.js ${{ matrix.node_version }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node_version }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: pnpm fetch
        run: pnpm fetch

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Set Playwright cache path
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            echo "PLAYWRIGHT_BROWSERS_PATH=$USERPROFILE/AppData/Local/ms-playwright" >> "$GITHUB_ENV"
          else
            echo "PLAYWRIGHT_BROWSERS_PATH=$HOME/Library/Caches/ms-playwright" >> "$GITHUB_ENV"
          fi

      - name: Cache Playwright Browsers
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Browsers
        run: npx playwright install chromium webkit

      # [DEBUG ONLY — not for main] Enable macOS core dumps + Node diagnostic
      # report so a worker SIGSEGV leaves something actionable behind. Core
      # dumps need both sysctl (kernel config) and ulimit (per-process limit);
      # the ulimit call lives in the test step below because it does not
      # persist across GH Actions steps.
      - name: Enable crash diagnostics (macOS only)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          sudo chmod 1777 /cores || true
          sudo sysctl kern.coredump=1 || true
          sudo sysctl kern.corefile=/cores/core.%N.%P || true
          mkdir -p "$RUNNER_TEMP/rstest-node-report"
          echo "RSTEST_POOL_DEBUG=1" >> "$GITHUB_ENV"
          echo "RSTEST_POOL_REPORT_DIR=$RUNNER_TEMP/rstest-node-report" >> "$GITHUB_ENV"

      - name: E2E Test (${{ matrix.test_script }}) [macOS]
        if: runner.os == 'macOS'
        shell: bash
        run: |
          ulimit -c unlimited
          cd e2e && pnpm ${{ matrix.test_script }}

      - name: E2E Test (${{ matrix.test_script }}) [Windows]
        if: runner.os == 'Windows'
        run: cd e2e && pnpm ${{ matrix.test_script }}

      - name: VS Code Extension Test
        if: matrix.test_script == 'test'
        run: pnpm run test:vscode

      # [DEBUG ONLY — not for main] Stage only node crash artifacts into a
      # single directory so the upload step has a clean path and doesn't burn
      # GH Actions storage quota on unrelated browser core dumps (the VS Code
      # extension test can leave a ~1 GB chrome-headless core behind during
      # teardown). Also computes a name-safe suffix — `test:commonjs` /
      # `test:no-isolate` contain colons which `upload-artifact` rejects.
      - name: Stage crash artifacts (macOS only)
        if: always() && runner.os == 'macOS'
        shell: bash
        env:
          MATRIX_TEST_SCRIPT: ${{ matrix.test_script }}
        run: |
          STAGE="$RUNNER_TEMP/crash-artifacts"
          mkdir -p "$STAGE"
          shopt -s nullglob
          for f in /cores/core.node.*; do
            [ -f "$f" ] && cp "$f" "$STAGE/"
          done
          if [ -d "$RUNNER_TEMP/rstest-node-report" ]; then
            cp -R "$RUNNER_TEMP/rstest-node-report" "$STAGE/" 2>/dev/null || true
          fi
          SAFE="${MATRIX_TEST_SCRIPT//:/-}"
          echo "ARTIFACT_SUFFIX=$SAFE" >> "$GITHUB_ENV"
          echo "Staged contents:" && ls -la "$STAGE" || true

      - name: Upload crash artifacts
        if: always() && runner.os == 'macOS'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: crash-${{ matrix.os }}-node${{ matrix.node_version }}-${{ env.ARTIFACT_SUFFIX }}-attempt${{ github.run_attempt }}
          path: ${{ runner.temp }}/crash-artifacts/
          if-no-files-found: ignore
          retention-days: 3

  # ======== gate ========
  test-gate:
    needs: [prepare, lint, ut, e2e]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check test requirement
        run: |
          for result in \
            "${{ needs.lint.result }}" \
            "${{ needs.ut.result }}" \
            "${{ needs.e2e.result }}"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              exit 1
            fi
          done
