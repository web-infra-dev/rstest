name: Release

on:
  workflow_dispatch:
    inputs:
      npm_tag:
        type: choice
        description: 'Specify npm tag'
        required: true
        default: 'alpha'
        options:
          - alpha
          - beta
          - rc
          - canary
          - latest
      branch:
        description: 'Branch to release'
        required: true
        default: 'main'

permissions:
  # Provenance generation in GitHub Actions requires "write" access to the "id-token"
  id-token: write

jobs:
  release:
    name: Release
    if: github.repository == 'web-infra-dev/rstest' && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
          ref: ${{ github.event.inputs.branch }}

      - name: Setup Pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          check-latest: true
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      # Update npm to the latest version to enable OIDC
      - name: Update npm
        run: |
          npm install -g npm@latest
          npm --version

      - name: Install Dependencies
        run: pnpm install

      - name: Build Packages
        run: pnpm run build

      - name: Publish to npm
        run: |
          pnpm --filter './packages/*' -r stage publish --tag ${{ github.event.inputs.npm_tag }} --no-git-checks

  release_vscode_extension:
    name: Release VS Code Extension (${{ matrix.vsce-target }})
    if: github.repository == 'web-infra-dev/rstest' && github.event_name == 'workflow_dispatch'
    needs: release
    runs-on: ${{ matrix.runner }}
    environment: vscode-marketplace
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            vsce-target: linux-x64
            platform: linux
            arch: x64
          - runner: ubuntu-22.04
            vsce-target: linux-arm64
            platform: linux
            arch: arm64
          - runner: macos-15
            vsce-target: darwin-x64
            platform: darwin
            arch: x64
          - runner: macos-15
            vsce-target: darwin-arm64
            platform: darwin
            arch: arm64
          - runner: windows-2022
            vsce-target: win32-x64
            platform: win32
            arch: x64
          - runner: windows-latest
            vsce-target: win32-arm64
            platform: win32
            arch: arm64
    defaults:
      run:
        shell: bash
    env:
      npm_config_arch: ${{ matrix.arch }}
      npm_config_platform: ${{ matrix.platform }}
      VSCE_TARGET: ${{ matrix.vsce-target }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
          ref: ${{ github.event.inputs.branch }}

      - name: Setup Pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Dependencies
        run: pnpm install

      - name: Build Packages
        run: pnpm run build

      - name: Package VS Code Extension
        run: pnpm --filter ./packages/vscode run package:vsce -o "rstest-${{ matrix.vsce-target }}.vsix"

      - name: Publish VS Code Extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: pnpm --filter ./packages/vscode exec vsce publish --target ${{ matrix.vsce-target }}

      - name: Publish OVSX Extension
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: pnpm --filter ./packages/vscode exec ovsx publish --target ${{ matrix.vsce-target }}
