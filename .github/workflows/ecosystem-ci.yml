name: Ecosystem CI

on:
  push:
    branches: ['main']
  workflow_dispatch:
    inputs:
      branch:
        description: 'The branch of the Ecosystem CI run'
        required: true
        default: 'main'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  changes:
    runs-on: ubuntu-latest
    if: github.repository == 'web-infra-dev/rstest' && github.event_name != 'workflow_dispatch'
    outputs:
      changed: ${{ steps.changes.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1

      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: changes
        with:
          predicate-quantifier: 'every'
          filters: |
            changed:
              - "!**/*.md"
              - "!**/*.mdx"
              - "!**/_meta.json"
              - "!**/dictionary.txt"
              - "!document/**"

  ecosystem_ci_dispatch:
    name: Dispatch ecosystem CI
    runs-on: ubuntu-latest
    if: github.repository == 'web-infra-dev/rstest' && github.event_name == 'workflow_dispatch'
    steps:
      - name: Trigger Ecosystem CI
        uses: rstackjs/rstack-ecosystem-ci/.github/actions/ecosystem_ci_dispatch@0ac412700ec0275dbb4d54958cb524dd08af4294 # main
        with:
          github-token: ${{ secrets.REPO_RSTEST_ECO_CI_GITHUB_TOKEN_NEXT }}
          ecosystem-owner: web-infra-dev
          ecosystem-repo: rstest
          workflow-file: rstest-ecosystem-ci-selected.yml
          client-payload: '{"ref":"${{ github.event.inputs.branch }}","repo":"web-infra-dev/rstest","suite":"-","suiteRefType":"precoded","suiteRef":"precoded"}'
          branch: ${{ github.event.inputs.branch }}

  ecosystem_ci_per_commit:
    name: Run ecosystem CI per commit
    needs: changes
    runs-on: ubuntu-latest
    if: github.repository == 'web-infra-dev/rstest' && github.event_name != 'workflow_dispatch' && needs.changes.outputs.changed == 'true'
    steps:
      - name: Trigger Ecosystem CI
        uses: rstackjs/rstack-ecosystem-ci/.github/actions/ecosystem_ci_per_commit@0ac412700ec0275dbb4d54958cb524dd08af4294 # main
        with:
          github-token: ${{ secrets.REPO_RSTEST_ECO_CI_GITHUB_TOKEN_NEXT }}
          ecosystem-owner: web-infra-dev
          ecosystem-repo: rstest
          workflow-file: rstest-ecosystem-ci-from-commit.yml
          client-payload: '{"commitSHA":"${{ github.sha }}","updateComment":true,"repo":"web-infra-dev/rstest","suite":"-","suiteRefType":"precoded","suiteRef":"precoded"}'
